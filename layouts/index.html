<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <style>
    body {
      max-width: 760px;
      margin: 64px auto;
      padding: 0 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 0.25rem;
    }

    a {
      color: inherit;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
      font-size: 0.95rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
  {{ .Content }}
  <footer>
    &copy; 2025 - {{ now.Year }} <a href="https://oczadly.io/">Paweł Oczadły</a>
  </footer>
</body>
</html>
